services:
  web:
    build: .
    command: gunicorn DjangoGramm.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./media:/app/media  # Keeps uploaded photos if container restarts
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=djangogramm
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secure_password_for_aws_only
    ports:
      - "5432:5432"

volumes:
  postgres_data: